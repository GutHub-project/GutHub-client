name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: guthub_client

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: develop
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Docker 레이어 캐시 설정
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 6. Docker 이미지 빌드, 태깅, ECR 푸시 (캐싱 적용)
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --cache-to type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache,mode=max \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NODE_ENV=production \
            .
          
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 5. EC2에 배포
      - name: Deploy to EC2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # SSH 연결 테스트 (재시도 로직 포함)
          echo "🔍 EC2 연결 테스트 중..."
          MAX_RETRIES=3
          RETRY_COUNT=0
          CONNECTED=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "시도 $RETRY_COUNT/$MAX_RETRIES..."
            
            if ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=15 \
                -o ServerAliveInterval=60 \
                -o ServerAliveCountMax=3 \
                -o BatchMode=yes \
                -i private_key.pem \
                $EC2_USER@$EC2_HOST \
                "echo '✅ EC2 연결 성공'" 2>&1; then
              CONNECTED=true
              break
            else
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "연결 실패. 5초 후 재시도..."
                sleep 5
              fi
            fi
          done
          
          if [ "$CONNECTED" != "true" ]; then
            echo ""
            echo "❌ EC2 SSH 연결 실패 (3회 시도 후 실패)"
            echo ""
            echo "⚠️  확인 필요 사항:"
            echo "   1. AWS 콘솔에서 EC2 인스턴스가 'running' 상태인지 확인"
            echo "   2. Security Group 인바운드 규칙에서 SSH(22번 포트)가 허용되어 있는지 확인"
            echo "     - 소스: 0.0.0.0/0 (모든 IP) 또는 GitHub Actions IP"
            echo "   3. EC2 인스턴스에 Public IP가 할당되어 있는지 확인"
            echo "   4. VPC/서브넷이 Public 서브넷인지 확인"
            echo "   5. Network ACL에서 22번 포트가 차단되지 않았는지 확인"
            echo ""
            echo "현재 설정:"
            echo "  EC2_HOST: ${EC2_HOST}"
            echo "  EC2_USER: ${EC2_USER}"
            echo ""
            echo "배포를 건너뜁니다. ECR 이미지는 빌드되었으므로 수동 배포 가능합니다."
            echo "이미지: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
            exit 0
          fi
          
          echo "🚀 배포 스크립트 실행 중..."
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=3 \
              -i private_key.pem \
              $EC2_USER@$EC2_HOST \
            ECR_REGISTRY="$ECR_REGISTRY" \
            IMAGE_TAG="$IMAGE_TAG" \
            ECR_REPOSITORY="$ECR_REPOSITORY" \
            NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            bash -s << 'EOF'
            set -e
            
            echo "📊 배포 전 디스크 사용량 확인..."
            df -h /
            
            echo "🧹 Docker 리소스 정리 중..."
            docker image prune -af --filter "until=24h" || true
            docker volume prune -f || true
            docker network prune -f || true
            
            DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            if [ "$DISK_USAGE" -gt 85 ]; then
              echo "⚠️  경고: 디스크 사용량이 ${DISK_USAGE}%입니다. 추가 정리를 수행합니다..."
              docker system prune -af --volumes || true
            fi
            
            echo "🔐 AWS ECR 로그인 중..."
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${ECR_REGISTRY}
            
            echo "🛑 기존 컨테이너 중지 및 제거..."
            docker stop guthub_client || true
            docker rm guthub_client || true
            
            echo "📥 새 Docker 이미지 다운로드 중..."
            docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            
            echo "🚀 새 컨테이너 시작 중..."
            docker run -d \
              --name guthub_client \
              -p 3000:3000 \
              --restart unless-stopped \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
              -e NODE_ENV=production \
              ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            
            echo "🧹 사용하지 않는 이미지 정리..."
            docker image prune -af
            
            echo "✅ 배포 완료! 디스크 사용량:"
            df -h /
            
            echo "🔍 컨테이너 상태 확인..."
            sleep 3
            docker ps -f name=guthub_client
          EOF
          
          rm -f private_key.pem

      # 6. 배포 결과 알림
      - name: Deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ 배포가 성공적으로 완료되었습니다!"
          else
            echo "❌ 배포 중 오류가 발생했습니다."
          fi

