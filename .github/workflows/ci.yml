name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  skip-ci:
    name: Skip CI
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "CI checks are disabled."


  # Job 4: Docker 이미지 빌드 검증 (PR에서만)
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image (no push)
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --tag guthub-client:pr-${{ github.event.pull_request.number }} \
            --load \
            .
          
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Test Docker image
        run: |
          # 컨테이너 실행 테스트
          docker run -d --name test-container -p 3000:3000 guthub-client:pr-${{ github.event.pull_request.number }}
          
          # 컨테이너가 정상 실행되는지 확인
          sleep 10
          
          if [ "$(docker ps -q -f name=test-container)" ]; then
            echo "✅ Docker 컨테이너가 정상적으로 실행되었습니다!"
            docker logs test-container
            docker stop test-container
          else
            echo "❌ Docker 컨테이너 실행 실패"
            docker logs test-container
            exit 1
          fi

  # Job 5: 의존성 검사
  dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: Check for duplicate dependencies
        run: pnpm dedupe --check || echo "중복된 의존성이 있습니다"
        continue-on-error: true

  # Job 6: CI 결과 요약
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()
    
    steps:
      - name: Check CI status
        run: |
          echo "## CI 검사 결과 📋" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "✅ Lint & Format Check: 통과" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Lint & Format Check: 실패" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build: 통과" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build: 실패" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if required checks failed
        if: |
          needs.lint.result != 'success' ||
          needs.build.result != 'success'
        run: |
          echo "❌ 필수 CI 검사가 실패했습니다."
          exit 1

